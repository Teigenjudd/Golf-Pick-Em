# Build settings (command / publish dir) stay in the Netlify dashboard — this file only
# adds the ignore rule, so it can't drift from or override them.

[build]
  # Skip the build when a commit touches no code. Netlify treats exit 0 from `ignore` as
  # "nothing to deploy", so documentation-only PRs (docs/, agents/, *.md, .claude/) cost
  # zero build minutes. `git diff --quiet` exits 0 when the given paths are unchanged.
  ignore = "git diff --quiet HEAD^ HEAD -- src public index.html package.json package-lock.json vite.config.js eslint.config.js netlify.toml netlify/ scripts/"

# Invite links unfurl as rich cards in iMessage/WhatsApp/Slack: this function runs in
# front of the CDN response on /join/*, looks the pool up by its join code, and writes
# real OG tags into the HTML before a crawler (which never runs our JavaScript) sees it.
[[edge_functions]]
  function = "join-preview"
  path = "/join/*"
